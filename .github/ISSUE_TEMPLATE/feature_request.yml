name: Feature Request
description: Suggest a new feature
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature!

  - type: input
    id: package
    attributes:
      label: Package / Skill
      description: Which package or skill is this related to? (or "new")
      placeholder: e.g. @aspect-mark/shared or new
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: A clear description of what you'd like.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions you've considered.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context or screenshots.
