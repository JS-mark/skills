name: New Skill Request
description: Request or propose a new Claude Code Skill
labels: [skill]
body:
  - type: markdown
    attributes:
      value: Thanks for proposing a new skill!

  - type: input
    id: name
    attributes:
      label: Skill name
      description: A short, kebab-case name for the skill.
      placeholder: e.g. git-workflow
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should this skill do? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: instructions
    attributes:
      label: Draft instructions
      description: If you have a rough draft of the skill instructions, paste them here.

  - type: dropdown
    id: complexity
    attributes:
      label: Estimated complexity
      options:
        - Simple (single SKILL.md)
        - Medium (SKILL.md + references)
        - Complex (SKILL.md + references + agent config)
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context about this skill.
